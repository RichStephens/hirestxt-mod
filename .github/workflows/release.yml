name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmoc lwtools

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build library
        run: make libhirestxt.a

      - name: Package binary artifact
        run: |
          tar -czf hirestxt-mod-bin.${{ steps.version.outputs.VERSION }}.tar.gz libhirestxt.a hirestxt.h

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: hirestxt-mod-bin.${{ steps.version.outputs.VERSION }}.tar.gz
          generate_release_notes: true
